$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command  # This is correct for trial definitions
name: train_model
display_name: train-model
inputs: 
  train_data:
    type: string          # Specify the type for train_data
  test_data:
    type: string          # Specify the type for test_data
  n_estimators:
    type: integer  
    default: 100 
  max_depth:
    type: integer         # Specify the type for max_depth
    default:20            # Provide the default value for max_depth
outputs:
  model_output:
    type: mlflow_model    # Specify the type for model_output
#code: ../../../data-science/src
code: ../../../model_train
command: >-
  python model_train.py 
  --train_data ${{inputs.train_data}}
  --test_data ${{inputs.test_data}}
  --n_estimators ${{inputs.n_estimators}}
  --max_depth ${{inputs.max_depth}}
  --model_output ${{outputs.model_output}}
environment: azureml:used-cars-train-env@latest